<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BurgerJazz Chatbot - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;background:#f4f5f7;color:#002855;min-height:100vh}
.header{background:#002855;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px;font-weight:700;letter-spacing:1px}
.header .status{display:flex;align-items:center;gap:8px;font-size:13px}
.header .dot{width:10px;height:10px;border-radius:50%}
.header .dot.ok{background:#16a34a}
.header .dot.err{background:#dc2626}
.header .dot.warn{background:#F5E1A4}
.header button{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:12px;font-weight:700}
.header button:hover{background:rgba(255,255,255,.25)}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#002855}
.login-box{background:#fff;border-radius:16px;padding:40px;text-align:center;width:340px}
.login-box h2{font-size:18px;margin-bottom:16px;color:#002855}
.login-box input{width:100%;padding:10px 14px;border:1px solid #e4e2dd;border-radius:8px;font-size:14px;margin-bottom:12px}
.login-box button{width:100%;padding:10px;background:#002855;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:16px 24px}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card h3{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.card .val{font-size:28px;font-weight:900;color:#002855}
.card .sub{font-size:11px;color:#6b7280;margin-top:4px}
.card.alert{border-left:4px solid #dc2626}
.card.ok{border-left:4px solid #16a34a}
.card.warn{border-left:4px solid #F5E1A4}
.section{padding:8px 24px}
.section h2{font-size:15px;font-weight:700;margin-bottom:10px;color:#002855}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:8px 24px}
.cats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.cat{background:#fff;border-radius:8px;padding:10px 16px;font-size:12px;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;align-items:center;gap:6px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.cat:hover,.cat.active{border-color:#002855;background:#002855;color:#fff}
.cat .cnt{background:#f4f5f7;color:#002855;border-radius:12px;padding:2px 8px;font-size:10px;font-weight:900}
.cat:hover .cnt,.cat.active .cnt{background:rgba(255,255,255,.2);color:#fff}
.chat-list{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);max-height:600px;overflow-y:auto}
.chat-row{padding:12px 16px;border-bottom:1px solid #f4f5f7;font-size:12px;cursor:pointer}
.chat-row:hover{background:#f9f9f7}
.chat-row .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.chat-row .time{font-size:10px;color:#6b7280}
.chat-row .cat-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase}
.chat-row .user-msg{color:#002855;font-weight:600;margin-bottom:2px}
.chat-row .bot-msg{color:#6b7280;font-weight:400}
.cat-carta{background:#dbeafe;color:#2563eb}
.cat-locales{background:#dcfce7;color:#16a34a}
.cat-pedidos{background:#fef3c7;color:#d97706}
.cat-seguimiento{background:#fef3c7;color:#d97706}
.cat-pedido_incompleto{background:#fee2e2;color:#dc2626}
.cat-incidencia{background:#fee2e2;color:#dc2626}
.cat-promos{background:#ede9fe;color:#7c3aed}
.cat-alergenos{background:#fce7f3;color:#be185d}
.cat-general{background:#f4f5f7;color:#6b7280}
.cat-error{background:#fee2e2;color:#dc2626}
.cat-reservas{background:#e0f2fe;color:#0284c7}
.cat-empleo{background:#f0fdf4;color:#15803d}
.cat-pagos{background:#fefce8;color:#a16207}
.cat-dieta{background:#f0fdfa;color:#0d9488}
.cat-facturas{background:#fefce8;color:#a16207}
.cat-horarios{background:#e0f2fe;color:#0284c7}
.empty{text-align:center;padding:40px;color:#6b7280;font-size:13px}
.date-filter{padding:8px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.date-filter label{font-size:12px;font-weight:700;color:#002855}
.date-filter input{padding:6px 10px;border:1px solid #e4e2dd;border-radius:8px;font-size:12px;font-family:'Lato',sans-serif}
.date-filter button{padding:6px 14px;background:#002855;color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer}
.date-filter button.secondary{background:#e4e2dd;color:#002855}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:100px;padding:10px 0}
.bar{background:#002855;border-radius:3px 3px 0 0;min-width:14px;flex:1;position:relative;transition:height .3s}
.bar:hover{background:#F5E1A4}
.bar .bar-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:8px;color:#6b7280;white-space:nowrap}
.bar .bar-val{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:#002855}
.hour-chart{display:flex;align-items:flex-end;gap:2px;height:80px;padding:10px 0}
.hour-bar{background:#002855;border-radius:2px 2px 0 0;flex:1;position:relative;transition:height .3s;min-width:8px}
.hour-bar:hover{background:#F5E1A4}
.hour-bar .h-label{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:7px;color:#6b7280}
.hour-bar .h-val{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;color:#002855}
.insight-box{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.insight-box h3{font-size:12px;font-weight:700;color:#002855;margin-bottom:10px}
.insight-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f4f5f7;font-size:12px}
.insight-row:last-child{border:none}
.insight-row .label{color:#6b7280}
.insight-row .value{font-weight:900;color:#002855}
.lang-bar{height:6px;border-radius:3px;margin-top:4px;display:flex;overflow:hidden}
.lang-bar span{height:100%}
.long-session{font-size:11px;padding:8px 0;border-bottom:1px solid #f4f5f7;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.long-session:hover{background:#f9f9f7}
.long-session .msgs{background:#fee2e2;color:#dc2626;font-size:9px;font-weight:900;padding:2px 8px;border-radius:10px}
.sentiment-neg{color:#dc2626;font-weight:700}
.sentiment-ok{color:#16a34a;font-weight:700}
.weekly-compare{display:flex;gap:16px;align-items:center;font-size:12px;margin-top:6px}
.weekly-compare .arrow-up{color:#dc2626;font-weight:900}
.weekly-compare .arrow-down{color:#16a34a;font-weight:900}
.weekly-compare .arrow-same{color:#6b7280;font-weight:900}
.sat-box{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin:0 24px 8px}
.sat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sat-header h3{font-size:14px;font-weight:700;color:#002855}
.sat-score{font-size:36px;font-weight:900;color:#002855}
.sat-stars{font-size:24px;margin:4px 0}
.sat-breakdown{display:flex;gap:12px;margin-top:12px}
.sat-bar-row{flex:1;display:flex;align-items:center;gap:6px;font-size:11px}
.sat-bar-row .emoji{font-size:16px}
.sat-bar-row .bar-bg{flex:1;height:8px;background:#f4f5f7;border-radius:4px;overflow:hidden}
.sat-bar-row .bar-fill{height:100%;border-radius:4px;transition:width .3s}
.sat-bar-row .cnt{font-weight:900;color:#002855;min-width:20px;text-align:right}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-header{padding:16px 20px;border-bottom:1px solid #f4f5f7;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:14px;color:#002855}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280;padding:4px 8px}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-msg{margin-bottom:12px;font-size:13px;line-height:1.6}
.modal-msg.user{background:#002855;color:#fff;padding:10px 14px;border-radius:12px 12px 4px 12px;max-width:85%;margin-left:auto}
.modal-msg.bot{background:#f4f5f7;color:#002855;padding:10px 14px;border-radius:12px 12px 12px 4px;max-width:85%}
.modal-msg .msg-time{font-size:9px;opacity:.6;margin-top:4px}
.modal-loading{text-align:center;padding:30px;color:#6b7280;font-size:13px}
@media(max-width:600px){.grid{grid-template-columns:1fr 1fr}.header h1{font-size:14px}.modal{max-width:100%;max-height:90vh}.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
var KEY=localStorage.getItem("bj_dash_key")||"";
var stats=null;
var filterCat="all";
var dateFrom="";
var dateTo="";

var LOCALES_MAP={
"chamberi":"Chamberi","modesto":"Chamberi","lafuente":"Chamberi",
"plaza espana":"Plaza Espana","fomento":"Plaza Espana",
"retiro":"Retiro","o'donnell":"Retiro","odonnell":"Retiro",
"delicias":"Delicias",
"alcorcon":"Alcorcon","timanfaya":"Alcorcon",
"majadahonda":"Majadahonda","reyes catolicos":"Majadahonda",
"pozuelo":"Pozuelo","atenas":"Pozuelo",
"mirasierra":"Mirasierra","fermin":"Mirasierra",
"malasana":"Malasana","santa ana":"Malasana","sin gluten":"Malasana",
"alcobendas":"Alcobendas","fuente lucha":"Alcobendas",
"valladolid":"Valladolid","moyano":"Valladolid",
"moraleja":"Moraleja Green"
};

var NEG_WORDS=/queja|problema|asco|asqueroso|mal|frio|tarde|tarda|nunca|horrible|peor|decepcion|vergüenza|inaceptable|lamentable|fatal|desastre|estafa|robo|mentira|falso|espera|denunci/i;
var LANG_PATTERNS={
"en":/\b(hello|hi|please|thank|would|could|where|what|how much|sorry|excuse|order|burger|menu|deliver|allergic)\b/i,
"fr":/\b(bonjour|merci|s'il vous|excusez|commander|allergique|menu|prix)\b/i,
"de":/\b(hallo|danke|bitte|entschuldigung|bestellen|allergie|speisekarte)\b/i,
"pt":/\b(ola|obrigado|por favor|desculpe|pedido|cardapio|alergia)\b/i,
"it":/\b(ciao|grazie|per favore|scusi|ordinare|menu|allergia)\b/i
};

function render(){
var app=document.getElementById("app");
if(!KEY){app.innerHTML=loginHTML();bindLogin();return}
if(!stats){app.innerHTML='<div class="login"><div class="login-box"><h2>Cargando...</h2></div></div>';loadStats();return}
app.innerHTML=headerHTML()+dateFilterHTML()+cardsHTML()+satisfactionHTML()+weeklyHTML()+chartHTML()+hourlyChartHTML()+insightsHTML()+catsHTML()+chatsHTML();
bindEvents();
}

function loginHTML(){
return '<div class="login"><div class="login-box"><h2>BURGERJAZZ Dashboard</h2><p style="font-size:12px;color:#6b7280;margin-bottom:16px">Introduce la clave del dashboard</p><input id="key_input" type="password" placeholder="Dashboard key..."><button id="key_btn">Entrar</button></div></div>';
}

function bindLogin(){
setTimeout(function(){
var b=document.getElementById("key_btn");
var i=document.getElementById("key_input");
if(b)b.onclick=function(){KEY=i.value.trim();localStorage.setItem("bj_dash_key",KEY);render()};
if(i)i.onkeydown=function(e){if(e.key==="Enter")b.click()};
},50);
}

function headerHTML(){
var cs=stats.creditStatus;
var dot=cs==="ok"?"ok":cs==="NO_CREDIT"?"err":"warn";
var label=cs==="ok"?"Creditos OK":cs==="NO_CREDIT"?"SIN CREDITOS":"Estado desconocido";
return '<div class="header"><h1>BURGERJAZZ CHATBOT DASHBOARD</h1><div class="status"><div class="dot '+dot+'"></div><span>'+label+'</span></div><button id="btn_refresh">Actualizar</button><button id="btn_logout">Salir</button></div>';
}

function dateFilterHTML(){
var today=new Date().toISOString().slice(0,10);
return '<div class="date-filter"><label>Desde</label><input type="date" id="date_from" value="'+(dateFrom||"")+'"><label>Hasta</label><input type="date" id="date_to" value="'+(dateTo||today)+'"><button id="btn_date_filter">Filtrar</button><button id="btn_date_clear" class="secondary">Limpiar</button></div>';
}

function filterByDate(list){
if(!dateFrom&&!dateTo)return list;
return list.filter(function(c){
var day=(c.ts||"").slice(0,10);
if(dateFrom&&day<dateFrom)return false;
if(dateTo&&day>dateTo)return false;
return true;
});
}

function getFilteredStats(){
if(!dateFrom&&!dateTo)return stats;
var filtered=filterByDate(stats.chats||[]);
var s={chats:filtered,totalChats:filtered.length,dailyCounts:{},categories:{},totalTokens:{input:0,output:0},creditStatus:stats.creditStatus,estimatedCost:stats.estimatedCost,hourlyCounts:{},sessions:stats.sessions,escalatedCount:stats.escalatedCount,uniqueSessions:stats.uniqueSessions};
filtered.forEach(function(c){
var day=(c.ts||"").slice(0,10);
if(day)s.dailyCounts[day]=(s.dailyCounts[day]||0)+1;
var cat=c.category||"general";
s.categories[cat]=(s.categories[cat]||0)+1;
if(c.tokens){s.totalTokens.input+=(c.tokens.input||0);s.totalTokens.output+=(c.tokens.output||0)}
var hour=c.ts?new Date(c.ts).getHours():"";
if(hour!=="")s.hourlyCounts[hour]=(s.hourlyCounts[hour]||0)+1;
});
return s;
}

// === 6. SENTIMIENTO ===
function detectSentiment(text){
if(!text)return "neutral";
return NEG_WORDS.test(text)?"negativo":"neutral";
}

// === 7. IDIOMAS ===
function detectLang(text){
if(!text)return "es";
for(var lang in LANG_PATTERNS){
if(LANG_PATTERNS[lang].test(text))return lang;
}
return "es";
}

// === 5. TOP LOCALES ===
function detectLocal(text){
if(!text)return null;
var t=text.toLowerCase();
for(var key in LOCALES_MAP){
if(t.indexOf(key)!==-1)return LOCALES_MAP[key];
}
return null;
}

function satisfactionHTML(){
var r=stats.ratings||{counts:{},average:0,total:0};
if(!r.total)return '<div class="sat-box"><div class="sat-header"><h3>Indice de Satisfaccion</h3></div><div style="color:#6b7280;font-size:12px">Sin valoraciones todavia</div></div>';
var emojis=["","😡","😕","😐","😊","🤩"];
var colors=["","#dc2626","#f97316","#eab308","#22c55e","#16a34a"];
var avg=r.average;
var starEmoji=avg>=4.5?"🤩":avg>=3.5?"😊":avg>=2.5?"😐":avg>=1.5?"😕":"😡";
var html='<div class="sat-box"><div class="sat-header"><h3>Indice de Satisfaccion</h3><div><div class="sat-score">'+avg.toFixed(1)+'/5</div><div class="sat-stars">'+starEmoji+' <span style="font-size:12px;color:#6b7280">'+r.total+' valoraciones</span></div></div></div>';
html+='<div style="display:flex;flex-direction:column;gap:6px">';
for(var i=5;i>=1;i--){
var cnt=r.counts[i]||0;
var pct=r.total>0?Math.round(cnt/r.total*100):0;
html+='<div class="sat-bar-row"><span class="emoji">'+emojis[i]+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+colors[i]+'"></div></div><span class="cnt">'+cnt+'</span></div>';
}
html+='</div></div>';
return html;
}

function cardsHTML(){
var fs=getFilteredStats();
var total=fs.totalChats||0;
var today=new Date().toISOString().slice(0,10);
var todayCount=fs.dailyCounts[today]||0;
var incCount=(fs.categories.incidencia||0)+(fs.categories.pedido_incompleto||0);
var errCount=fs.categories.error||0;
var cs=stats.creditStatus;
var creditClass=cs==="ok"?"ok":cs==="NO_CREDIT"?"alert":"warn";
// Tasa resolucion
var totalSessions=stats.uniqueSessions||1;
var escalated=stats.escalatedCount||0;
var resolved=totalSessions-escalated;
var resRate=totalSessions>0?Math.round((resolved/totalSessions)*100):0;
var resClass=resRate>=80?"ok":resRate>=50?"warn":"alert";

return '<div class="grid">'+
'<div class="card"><h3>Total mensajes</h3><div class="val">'+total+'</div><div class="sub">'+totalSessions+' sesiones unicas</div></div>'+
'<div class="card"><h3>Hoy</h3><div class="val">'+todayCount+'</div><div class="sub">'+today+'</div></div>'+
'<div class="card '+resClass+'"><h3>Tasa resolucion</h3><div class="val">'+resRate+'%</div><div class="sub">Bot resolvio sin escalar</div></div>'+
'<div class="card '+(incCount>0?"alert":"ok")+'"><h3>Incidencias</h3><div class="val">'+incCount+'</div><div class="sub">Quejas y problemas</div></div>'+
'<div class="card '+creditClass+'"><h3>Creditos API</h3><div class="val" style="font-size:16px">'+(cs==="ok"?"Activos":"AGOTADOS")+'</div><div class="sub">'+(stats.estimatedCost||"$0")+" gastado"+'</div></div>'+
'<div class="card '+(errCount>0?"alert":"ok")+'"><h3>Errores API</h3><div class="val">'+errCount+'</div><div class="sub">Fallos tecnicos</div></div>'+
'</div>';
}

// === 8. RESUMEN SEMANAL ===
function weeklyHTML(){
var fs=getFilteredStats();
var days=Object.keys(fs.dailyCounts).sort();
if(days.length<2)return '';
var today=new Date();
var thisWeek=0,lastWeek=0,thisWeekInc=0,lastWeekInc=0;
var chats=fs.chats||[];
chats.forEach(function(c){
var d=new Date(c.ts);
var diff=(today-d)/(1000*60*60*24);
if(diff<=7){thisWeek++;if(c.category==="incidencia"||c.category==="pedido_incompleto")thisWeekInc++}
else if(diff<=14){lastWeek++;if(c.category==="incidencia"||c.category==="pedido_incompleto")lastWeekInc++}
});
var msgDiff=thisWeek-lastWeek;
var incDiff=thisWeekInc-lastWeekInc;
function arrow(diff,invert){
if(diff>0)return '<span class="'+(invert?"arrow-up":"arrow-down")+'">+'+diff+'</span>';
if(diff<0)return '<span class="'+(invert?"arrow-down":"arrow-up")+'">'+diff+'</span>';
return '<span class="arrow-same">=</span>';
}
return '<div class="section"><h2>Resumen semanal</h2><div class="weekly-compare">'+
'<span>Mensajes esta semana: <strong>'+thisWeek+'</strong> '+arrow(msgDiff,false)+' vs semana anterior ('+lastWeek+')</span>'+
'</div><div class="weekly-compare">'+
'<span>Incidencias esta semana: <strong>'+thisWeekInc+'</strong> '+arrow(incDiff,true)+' vs semana anterior ('+lastWeekInc+')</span>'+
'</div></div>';
}

function chartHTML(){
var fs=getFilteredStats();
var days=Object.keys(fs.dailyCounts).sort();
if(!days.length)return '';
var max=Math.max.apply(null,days.map(function(d){return fs.dailyCounts[d]}));
if(max===0)max=1;
var bars='';
days.slice(-14).forEach(function(d){
var v=fs.dailyCounts[d];
var h=Math.max(4,Math.round(v/max*80));
bars+='<div class="bar" style="height:'+h+'px"><div class="bar-val">'+v+'</div><div class="bar-label">'+d.slice(5)+'</div></div>';
});
return '<div class="section"><h2>Mensajes ultimos 14 dias</h2><div class="bar-chart">'+bars+'</div><div style="height:24px"></div></div>';
}

// === 1. HORAS PUNTA ===
function hourlyChartHTML(){
var fs=getFilteredStats();
var hc=fs.hourlyCounts||stats.hourlyCounts||{};
var hours=[];for(var i=0;i<24;i++)hours.push(i);
var max=0;hours.forEach(function(h){if((hc[h]||0)>max)max=hc[h]||0});
if(max===0)return '';
var bars='';
var peakHour=0,peakVal=0;
hours.forEach(function(h){
var v=hc[h]||0;
if(v>peakVal){peakVal=v;peakHour=h}
var ht=Math.max(2,Math.round(v/max*60));
bars+='<div class="hour-bar" style="height:'+ht+'px"><div class="h-val">'+(v||"")+'</div><div class="h-label">'+h+'h</div></div>';
});
return '<div class="section"><h2>Horas punta <span style="font-weight:400;font-size:12px;color:#6b7280">Pico: '+peakHour+':00h</span></h2><div class="hour-chart">'+bars+'</div><div style="height:20px"></div></div>';
}

// === INSIGHTS (Locales, Idiomas, Sentimiento, Conv largas, Top preguntas) ===
function insightsHTML(){
var fs=getFilteredStats();
var chats=fs.chats||[];

// 3. Top locales mencionados
var localCounts={};
chats.forEach(function(c){
var loc=detectLocal(c.user);
if(loc)localCounts[loc]=(localCounts[loc]||0)+1;
});
var topLocales=Object.keys(localCounts).sort(function(a,b){return localCounts[b]-localCounts[a]}).slice(0,6);

// 5. Top preguntas (categorias mas frecuentes)
var catCounts=fs.categories||{};
var topCats=Object.keys(catCounts).filter(function(k){return k!=="general"&&k!=="error"}).sort(function(a,b){return catCounts[b]-catCounts[a]}).slice(0,5);

// 6. Sentimiento
var negCount=0,totalUser=0;
chats.forEach(function(c){
if(c.user){totalUser++;if(detectSentiment(c.user)==="negativo")negCount++}
});
var negPct=totalUser>0?Math.round(negCount/totalUser*100):0;

// 7. Idiomas
var langCounts={};
chats.forEach(function(c){
if(c.user){var l=detectLang(c.user);langCounts[l]=(langCounts[l]||0)+1}
});
var totalLang=0;for(var k in langCounts)totalLang+=langCounts[k];
var langColors={"es":"#002855","en":"#2563eb","fr":"#7c3aed","de":"#d97706","pt":"#16a34a","it":"#dc2626"};
var langNames={"es":"Espanol","en":"Ingles","fr":"Frances","de":"Aleman","pt":"Portugues","it":"Italiano"};

// 4. Conversaciones largas
var longSessions=(stats.sessions||[]).filter(function(s){return s.msgCount>=4}).slice(0,8);

var html='<div class="two-col">';

// LEFT COLUMN
html+='<div>';

// Top locales
html+='<div class="insight-box" style="margin-bottom:12px"><h3>Top locales mencionados</h3>';
if(topLocales.length){
topLocales.forEach(function(loc){
html+='<div class="insight-row"><span class="label">'+loc+'</span><span class="value">'+localCounts[loc]+'</span></div>';
});
}else{html+='<div class="insight-row"><span class="label">Sin datos suficientes</span></div>'}
html+='</div>';

// Top preguntas
html+='<div class="insight-box" style="margin-bottom:12px"><h3>Temas mas consultados</h3>';
if(topCats.length){
topCats.forEach(function(cat){
html+='<div class="insight-row"><span class="label cat-tag cat-'+cat+'" style="font-size:11px">'+cat+'</span><span class="value">'+catCounts[cat]+'</span></div>';
});
}else{html+='<div class="insight-row"><span class="label">Sin datos</span></div>'}
html+='</div>';

html+='</div>';

// RIGHT COLUMN
html+='<div>';

// Sentimiento
html+='<div class="insight-box" style="margin-bottom:12px"><h3>Sentimiento</h3>';
html+='<div class="insight-row"><span class="label">Mensajes negativos</span><span class="'+(negPct>15?"sentiment-neg":"sentiment-ok")+'">'+negPct+'% ('+negCount+'/'+totalUser+')</span></div>';
html+='</div>';

// Idiomas
html+='<div class="insight-box" style="margin-bottom:12px"><h3>Idiomas detectados</h3>';
var langBar='<div class="lang-bar">';
for(var lang in langCounts){
var pct=Math.round(langCounts[lang]/totalLang*100);
langBar+='<span style="width:'+pct+'%;background:'+(langColors[lang]||"#6b7280")+'" title="'+(langNames[lang]||lang)+': '+pct+'%"></span>';
}
langBar+='</div>';
html+=langBar;
for(var lang2 in langCounts){
var pct2=Math.round(langCounts[lang2]/totalLang*100);
html+='<div class="insight-row"><span class="label">'+(langNames[lang2]||lang2)+'</span><span class="value">'+pct2+'% ('+langCounts[lang2]+')</span></div>';
}
html+='</div>';

// Conversaciones largas
html+='<div class="insight-box" style="margin-bottom:12px"><h3>Conversaciones largas (posible frustracion)</h3>';
if(longSessions.length){
longSessions.forEach(function(s){
var t=s.firstTs?new Date(s.firstTs).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):"";
html+='<div class="long-session" data-session="'+escHtml(s.session)+'"><span>'+t+' — '+escHtml((s.session||"").slice(0,12))+'</span><span class="msgs">'+s.msgCount+' msgs</span></div>';
});
}else{html+='<div class="insight-row"><span class="label">Ninguna (+4 mensajes)</span></div>'}
html+='</div>';

html+='</div></div>';
return html;
}

function catsHTML(){
var fs=getFilteredStats();
var cats=fs.categories||{};
var keys=Object.keys(cats).sort(function(a,b){return cats[b]-cats[a]});
var html='<div class="cat'+(filterCat==="all"?" active":"")+'" data-cat="all"><span>Todas</span></div>';
keys.forEach(function(k){
html+='<div class="cat cat-'+k+(filterCat===k?" active":"")+'" data-cat="'+k+'"><span>'+k+'</span><span class="cnt">'+cats[k]+'</span></div>';
});
return '<div class="section"><h2>Categorias</h2><div class="cats" id="cat_filter">'+html+'</div></div>';
}

function chatsHTML(){
var fs=getFilteredStats();
var chats=fs.chats||[];
if(filterCat!=="all")chats=chats.filter(function(c){return c.category===filterCat});
if(!chats.length)return '<div class="section"><div class="chat-list"><div class="empty">Sin conversaciones'+(filterCat!=="all"?' en "'+filterCat+'"':'')+'</div></div></div>';
var rows='';
chats.slice(0,100).forEach(function(c){
var time=c.ts?new Date(c.ts).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):"";
var isErr=c.category==="error"||c.category==="incidencia"||c.category==="pedido_incompleto";
var sentiment=detectSentiment(c.user);
var sentIcon=sentiment==="negativo"?' <span style="color:#dc2626;font-size:10px">NEG</span>':"";
rows+='<div class="chat-row'+(isErr?" style=\"background:#fff5f5\"":"")+'" data-session="'+escHtml(c.session||"")+'"><div class="meta"><span class="time">'+time+' | Session: '+((c.session||"").slice(0,12))+'</span><span class="cat-tag cat-'+(c.category||"general")+'">'+(c.category||"general")+'</span></div><div class="user-msg">Cliente: '+escHtml(c.user||"")+sentIcon+'</div><div class="bot-msg">Bot: '+escHtml((c.bot||"").slice(0,200))+(c.bot&&c.bot.length>200?"...":"")+'</div></div>';
});
return '<div class="section"><h2>Conversaciones recientes'+(filterCat!=="all"?' ('+filterCat+')':'')+'</h2><div class="chat-list">'+rows+'</div></div>';
}

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function bindEvents(){
setTimeout(function(){
var r=document.getElementById("btn_refresh");
if(r)r.onclick=function(){stats=null;render()};
var l=document.getElementById("btn_logout");
if(l)l.onclick=function(){KEY="";localStorage.removeItem("bj_dash_key");stats=null;render()};
var df=document.getElementById("btn_date_filter");
if(df)df.onclick=function(){
dateFrom=document.getElementById("date_from").value;
dateTo=document.getElementById("date_to").value;
render();
};
var dc=document.getElementById("btn_date_clear");
if(dc)dc.onclick=function(){dateFrom="";dateTo="";render()};
var cf=document.getElementById("cat_filter");
if(cf)cf.onclick=function(e){
var t=e.target.closest(".cat");
if(t){filterCat=t.dataset.cat;render()}
};
var cl=document.querySelector(".chat-list");
if(cl)cl.onclick=function(e){
var row=e.target.closest(".chat-row");
if(row&&row.dataset.session)openSession(row.dataset.session);
};
// Long sessions clickable
var ls=document.querySelectorAll(".long-session");
ls.forEach(function(el){
el.onclick=function(){openSession(el.dataset.session)};
});
},50);
}

function openSession(sid){
var modal=document.createElement("div");
modal.className="modal-bg";
modal.innerHTML='<div class="modal"><div class="modal-header"><h3>Conversacion '+escHtml(sid.slice(0,16))+'</h3><button class="modal-close">&times;</button></div><div class="modal-body"><div class="modal-loading">Cargando conversacion...</div></div></div>';
document.body.appendChild(modal);
modal.querySelector(".modal-close").onclick=function(){modal.remove()};
modal.onclick=function(e){if(e.target===modal)modal.remove()};

fetch("/api/stats?key="+encodeURIComponent(KEY)+"&session="+encodeURIComponent(sid))
.then(function(r){return r.json()})
.then(function(data){
var body=modal.querySelector(".modal-body");
if(!data.messages||!data.messages.length){body.innerHTML='<div class="modal-loading">Sin mensajes</div>';return}
var html='';
data.messages.forEach(function(m){
var t=m.ts?new Date(m.ts).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):"";
if(m.user)html+='<div class="modal-msg user">'+escHtml(m.user)+'<div class="msg-time">'+t+'</div></div>';
if(m.bot)html+='<div class="modal-msg bot">'+escHtml(m.bot)+'<div class="msg-time">'+t+'</div></div>';
});
body.innerHTML=html;
})
.catch(function(){modal.querySelector(".modal-body").innerHTML='<div class="modal-loading">Error cargando</div>'});
}

function loadStats(){
fetch("/api/stats?key="+encodeURIComponent(KEY))
.then(function(r){
if(r.status===401){KEY="";localStorage.removeItem("bj_dash_key");alert("Clave incorrecta");render();return null}
return r.json()
})
.then(function(data){if(data){stats=data;render()}})
.catch(function(){alert("Error cargando datos");});
}

render();
})();
</script>
</body>
</html>
