<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#002855">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/favicon.png">
<title>BurgerJazz - Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;
  --card:#fff;
  --navy:#002855;
  --text:#1a1a2e;
  --muted:#8893a4;
  --border:#e8eaed;
  --green:#10b981;
  --red:#ef4444;
  --orange:#f59e0b;
  --blue:#3b82f6;
  --hover:#f8f9fb;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 4px 12px rgba(0,0,0,.08);
  --radius:14px;
}
body.dark{
  --bg:#0c0f1a;
  --card:#161b2e;
  --navy:#1e3a5f;
  --text:#e2e8f0;
  --muted:#64748b;
  --border:#1e293b;
  --hover:#1e293b;
  --shadow:0 1px 3px rgba(0,0,0,.2);
  --shadow-lg:0 4px 12px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* === HEADER === */
.header{
  background:var(--navy);color:#fff;
  padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
  flex-wrap:wrap;gap:8px;
}
.header h1{font-size:15px;font-weight:800;letter-spacing:1.5px;white-space:nowrap}
.header .right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hbtn{
  background:rgba(255,255,255,.1);color:#fff;border:none;
  border-radius:8px;padding:8px 14px;cursor:pointer;
  font-size:11px;font-weight:700;letter-spacing:.3px;
  transition:all .15s;backdrop-filter:blur(4px);
}
.hbtn:hover{background:rgba(255,255,255,.2);transform:translateY(-1px)}
.hbtn:active{transform:translateY(0)}
.hbtn.green{background:rgba(16,185,129,.9)}
.hbtn.green:hover{background:rgba(16,185,129,1)}

/* === LOGIN === */
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#002855 0%,#003d7a 50%,#001a3a 100%)}
.login-box{background:var(--card);border-radius:20px;padding:48px 40px;text-align:center;width:360px;max-width:90vw;box-shadow:var(--shadow-lg)}
.login-box h2{font-size:20px;font-weight:800;margin-bottom:6px;color:var(--text);letter-spacing:.5px}
.login-box .sub{font-size:12px;color:var(--muted);margin-bottom:24px}
.login-box input{
  width:100%;padding:12px 16px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;margin-bottom:10px;
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;
  transition:border .2s;
}
.login-box input:focus{border-color:var(--blue);outline:none}
.login-box button{
  width:100%;padding:12px;margin-top:6px;
  background:var(--navy);color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:opacity .15s;
}
.login-box button:hover{opacity:.9}

/* === SEARCH === */
.search-wrap{padding:16px 24px 8px}
.search-wrap input{
  width:100%;padding:12px 18px;
  border:1.5px solid var(--border);border-radius:12px;
  font-size:13px;font-family:'Inter',sans-serif;
  background:var(--card);color:var(--text);
  box-shadow:var(--shadow);
  transition:border .2s,box-shadow .2s;
}
.search-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1);outline:none}
.search-wrap input::placeholder{color:var(--muted)}

/* === KPI CARDS === */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:12px 24px}
.kpi{
  background:var(--card);border-radius:var(--radius);
  padding:20px;box-shadow:var(--shadow);
  transition:transform .15s,box-shadow .15s;
  position:relative;overflow:hidden;
}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.kpi h3{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.kpi .val{font-size:32px;font-weight:900;color:var(--text);line-height:1}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:6px;font-weight:500}
.kpi.alert{border-left:4px solid var(--red)}
.kpi.alert .val{color:var(--red)}
.kpi.ok{border-left:4px solid var(--green)}

/* === CONVERSATIONS === */
.conversations{padding:8px 24px 24px}
.conv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.conv-header h2{font-size:15px;font-weight:800;color:var(--text)}
.conv-header .count{font-size:11px;color:var(--muted);font-weight:500;margin-left:8px}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{
  padding:7px 16px;border-radius:20px;
  font-size:11px;font-weight:700;cursor:pointer;
  border:none;transition:all .15s;
  letter-spacing:.2px;
}
.tab.active{box-shadow:0 2px 6px rgba(0,0,0,.1)}
.tab-all{background:var(--border);color:var(--text)}
.tab-all.active{background:var(--navy);color:#fff}
.tab-pending{background:#fef2f2;color:var(--red)}
.tab-pending.active{background:var(--red);color:#fff}
.tab-agent{background:#fffbeb;color:var(--orange)}
.tab-agent.active{background:var(--orange);color:#fff}
.tab-bot{background:#ecfdf5;color:var(--green)}
.tab-bot.active{background:var(--green);color:#fff}

.chat-list{
  background:var(--card);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);
  max-height:calc(100vh - 280px);overflow-y:auto;
}
.chat-row{
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;
}
.chat-row:last-child{border-bottom:none}
.chat-row:hover{background:var(--hover)}
.chat-row .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.chat-row .time{font-size:10px;color:var(--muted);font-weight:500}
.chat-row .badges{display:flex;gap:4px;align-items:center}
.status-badge{
  font-size:8px;font-weight:800;padding:3px 8px;
  border-radius:6px;text-transform:uppercase;letter-spacing:.5px;
}
.badge-pending{background:#fef2f2;color:var(--red);animation:pulse-soft 2s infinite}
.badge-agent{background:#fffbeb;color:var(--orange)}
.badge-msgs{font-size:9px;color:var(--muted);font-weight:600}
@keyframes pulse-soft{0%,100%{opacity:1}50%{opacity:.6}}
.chat-row .user-msg{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.4}
.chat-row .bot-msg{font-size:11px;color:var(--muted);font-weight:400;line-height:1.4}
.chat-row .inc-info{font-size:10px;color:var(--muted);margin-top:3px}
.chat-row .cat-tag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:6px;text-transform:uppercase;margin-right:3px}
.cat-carta{background:#dbeafe;color:#2563eb}
.cat-locales{background:#dcfce7;color:#16a34a}
.cat-pedidos,.cat-seguimiento{background:#fef3c7;color:#d97706}
.cat-pedido_incompleto,.cat-incidencia{background:#fee2e2;color:#dc2626}
.cat-promos{background:#ede9fe;color:#7c3aed}
.cat-alergenos{background:#fce7f3;color:#be185d}
.cat-general{background:var(--border);color:var(--muted)}
.cat-error{background:#fee2e2;color:#dc2626}
.cat-reservas,.cat-horarios{background:#e0f2fe;color:#0284c7}
.cat-empleo{background:#f0fdf4;color:#15803d}
.cat-pagos,.cat-facturas{background:#fefce8;color:#a16207}
.cat-dieta{background:#f0fdfa;color:#0d9488}
.cat-recomendacion{background:#faf5ff;color:#7c3aed}
.search-highlight{background:#fef08a;color:#000;padding:0 2px;border-radius:2px}

/* === MODAL === */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:560px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:13px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:6px;transition:background .15s}
.modal-close:hover{background:var(--border)}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-msg{margin-bottom:10px;font-size:13px;line-height:1.6}
.modal-msg.user{background:var(--navy);color:#fff;padding:10px 14px;border-radius:14px 14px 4px 14px;max-width:82%;margin-left:auto}
.modal-msg.bot{background:var(--bg);color:var(--text);padding:10px 14px;border-radius:14px 14px 14px 4px;max-width:82%}
.modal-msg .msg-time{font-size:8px;opacity:.5;margin-top:4px}
.modal-loading{text-align:center;padding:32px;color:var(--muted);font-size:12px}
.admin-msg{background:#fffbeb;color:#92400e;padding:10px 14px;border-radius:14px 14px 14px 4px;max-width:82%;margin-bottom:10px;font-size:13px;line-height:1.6;border-left:3px solid #f59e0b}
.admin-msg b{font-size:9px;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px}

/* === MOBILE === */
@media(max-width:768px){
  .header{padding:12px 16px;gap:6px}
  .header h1{font-size:13px}
  .header .right{gap:6px;justify-content:flex-end}
  .hbtn{padding:7px 10px;font-size:10px}
  .search-wrap{padding:12px 16px 6px}
  .kpis{padding:8px 16px;gap:8px}
  .kpi{padding:14px}
  .kpi .val{font-size:24px}
  .kpi h3{font-size:9px}
  .conversations{padding:6px 16px 16px}
  .chat-list{max-height:calc(100vh - 320px)}
  .modal{max-width:100%;max-height:95vh;border-radius:14px 14px 0 0;margin-top:auto}
  .modal-bg{align-items:flex-end;padding:0}
}
@media(max-width:420px){
  .kpis{grid-template-columns:1fr 1fr 1fr;gap:6px}
  .kpi{padding:12px}
  .kpi .val{font-size:20px}
  .header{padding:10px 12px}
  .header .right{gap:4px}
  .hbtn{padding:5px 7px;font-size:9px;border-radius:6px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){

var KEY=localStorage.getItem("bj_dash_key")||"";
var CURRENT_USER_INIT=localStorage.getItem("bj_dash_user")||"";
var stats=null;
var searchQuery="";
var darkMode=localStorage.getItem("bj_dark")==="1";
var autoRefresh=true;
var refreshTimer=null;
var lastIncidentCount=0;
var chatViewFilter="all";

if(darkMode)document.body.classList.add("dark");

// === AUDIO ===
function playNotifSound(){
  try{var a=new(window.AudioContext||window.webkitAudioContext)();var o=a.createOscillator();var g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;o.type="sine";g.gain.value=0.15;o.start();o.stop(a.currentTime+0.15);setTimeout(function(){var o2=a.createOscillator();var g2=a.createGain();o2.connect(g2);g2.connect(a.destination);o2.frequency.value=1100;o2.type="sine";g2.gain.value=0.12;o2.start();o2.stop(a.currentTime+0.15)},180)}catch(e){}
}

// === HELPERS ===
function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function highlightSearch(text,query){
  if(!query)return escHtml(text);
  var esc=escHtml(text);
  var re=new RegExp("("+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+")","gi");
  return esc.replace(re,'<span class="search-highlight">$1</span>');
}
function getFilteredChats(){
  var chats=stats.chats||[];
  if(!searchQuery)return chats;
  var q=searchQuery.toLowerCase();
  return chats.filter(function(c){return(c.user||"").toLowerCase().indexOf(q)!==-1||(c.bot||"").toLowerCase().indexOf(q)!==-1||(c.session||"").toLowerCase().indexOf(q)!==-1});
}

// === RENDER ===
function render(){
  var app=document.getElementById("app");
  if(!KEY){app.innerHTML=loginHTML();bindLogin();return}
  if(!stats){app.innerHTML='<div class="login"><div class="login-box"><h2>Cargando...</h2><div class="sub">Conectando con el servidor</div></div></div>';loadStats();return}
  app.innerHTML=headerHTML()+searchHTML()+kpiHTML()+chatsHTML();
  bindEvents();
  startAutoRefresh();
}

var CURRENT_USER="";

function loginHTML(){
  return '<div class="login"><div class="login-box"><h2>BURGERJAZZ</h2><div class="sub">Panel de agentes</div><input id="user_input" type="text" placeholder="Usuario"><input id="key_input" type="password" placeholder="Clave"><button id="key_btn">Entrar</button></div></div>';
}

function bindLogin(){
  setTimeout(function(){
    var b=document.getElementById("key_btn");
    var u=document.getElementById("user_input");
    var i=document.getElementById("key_input");
    if(!b)return;
    b.onclick=function(){
      var user=u.value.trim();var pass=i.value.trim();
      if(!user||!pass){alert("Introduce usuario y clave");return}
      KEY=user+":"+pass;localStorage.setItem("bj_dash_key",KEY);
      CURRENT_USER=user;localStorage.setItem("bj_dash_user",user);render();
    };
    i.onkeydown=function(e){if(e.key==="Enter")b.click()};
    u.onkeydown=function(e){if(e.key==="Enter")i.focus()};
  },50);
}

function headerHTML(){
  var pushLabel=window._pushSubscribed?'Notif ON':'Notif OFF';
  var pushClass=window._pushSubscribed?'hbtn green':'hbtn';
  return '<div class="header"><h1>BURGERJAZZ</h1><div class="right">'
    +'<button class="'+pushClass+'" id="btn_push">'+pushLabel+'</button>'
    +'<button class="hbtn" id="btn_report">Informe</button>'
    +'<button class="hbtn" id="btn_dark">'+(darkMode?'Claro':'Oscuro')+'</button>'
    +'<button class="hbtn" id="btn_refresh">Actualizar</button>'
    +'<button class="hbtn" id="btn_logout">Salir</button>'
    +'</div></div>';
}

function searchHTML(){
  return '<div class="search-wrap"><input type="text" id="search_input" placeholder="Buscar por mensaje, cliente o sesion..." value="'+escHtml(searchQuery)+'"></div>';
}

function kpiHTML(){
  var today=new Date().toISOString().slice(0,10);
  var todayCount=(stats.dailyCounts||{})[today]||0;
  var pendingInc=(stats.incidents_list||[]).filter(function(i){return i.status!=="resolved"}).length;
  var r=stats.ratings||{average:0,total:0};
  var avg=r.average||0;
  var starEmoji=avg>=4.5?"&#129321;":avg>=3.5?"&#128522;":avg>=2.5?"&#128528;":avg>=1.5?"&#128533;":"&#128545;";
  var pendingClass=pendingInc>0?"alert":"ok";
  return '<div class="kpis">'
    +'<div class="kpi"><h3>Hoy</h3><div class="val">'+todayCount+'</div><div class="sub">conversaciones</div></div>'
    +'<div class="kpi '+pendingClass+'"><h3>Pendientes</h3><div class="val">'+pendingInc+'</div><div class="sub">requieren atencion</div></div>'
    +'<div class="kpi"><h3>Satisfaccion</h3><div class="val">'+avg.toFixed(1)+'</div><div class="sub">'+starEmoji+' de '+r.total+' votos</div></div>'
    +'</div>';
}

function chatsHTML(){
  var chats=getFilteredChats();
  if(!chats.length)return '<div class="conversations"><div class="chat-list"><div style="text-align:center;padding:48px;color:var(--muted);font-size:13px">Sin conversaciones</div></div></div>';

  // Map only UNRESOLVED incidents by session
  var incMap={};(stats.incidents_list||[]).forEach(function(inc){if(inc.session&&inc.status!=="resolved")incMap[inc.session]=inc});

  // Group by session
  var sessionMap={};var sessionOrder=[];
  chats.forEach(function(c){
    var sid=c.session||"unknown";
    if(!sessionMap[sid]){sessionMap[sid]={msgs:[],cats:{},firstTs:c.ts,lastTs:c.ts,hasAgent:false,hasIncident:false};sessionOrder.push(sid)}
    var s=sessionMap[sid];
    s.msgs.push(c);
    if(new Date(c.ts)<new Date(s.firstTs))s.firstTs=c.ts;
    if(new Date(c.ts)>new Date(s.lastTs))s.lastTs=c.ts;
    if(c.category)s.cats[c.category]=(s.cats[c.category]||0)+1;
    if(c.category==="agent_mode"||c.category==="admin_reply"||c.prompt_version==="ADMIN"||c.user==="[ADMIN]")s.hasAgent=true;
  });
  // Only mark as incident if there's an UNRESOLVED incident for this session
  sessionOrder.forEach(function(sid){if(incMap[sid])sessionMap[sid].hasIncident=true});

  // Filter
  var filtered=sessionOrder;
  if(chatViewFilter==="incidents")filtered=filtered.filter(function(sid){return sessionMap[sid].hasIncident&&!sessionMap[sid].hasAgent});
  else if(chatViewFilter==="agent")filtered=filtered.filter(function(sid){return sessionMap[sid].hasAgent});
  else if(chatViewFilter==="bot")filtered=filtered.filter(function(sid){return!sessionMap[sid].hasIncident&&!sessionMap[sid].hasAgent});

  // Sort: incidents first, then by time
  filtered.sort(function(a,b){
    var aI=sessionMap[a].hasIncident?1:0;
    var bI=sessionMap[b].hasIncident?1:0;
    if(aI!==bI)return bI-aI;
    return new Date(sessionMap[b].lastTs)-new Date(sessionMap[a].lastTs);
  });

  // Counts
  var cAll=sessionOrder.length;
  var cInc=sessionOrder.filter(function(sid){return sessionMap[sid].hasIncident&&!sessionMap[sid].hasAgent}).length;
  var cAgent=sessionOrder.filter(function(sid){return sessionMap[sid].hasAgent}).length;
  var cBot=sessionOrder.filter(function(sid){return!sessionMap[sid].hasIncident&&!sessionMap[sid].hasAgent}).length;

  var tabs='<div class="tabs">'
    +'<button class="tab tab-all'+(chatViewFilter==="all"?" active":"")+'" data-view="all">Todas '+cAll+'</button>'
    +'<button class="tab tab-pending'+(chatViewFilter==="incidents"?" active":"")+'" data-view="incidents">Incidencias '+cInc+'</button>'
    +'<button class="tab tab-agent'+(chatViewFilter==="agent"?" active":"")+'" data-view="agent">Con agente '+cAgent+'</button>'
    +'<button class="tab tab-bot'+(chatViewFilter==="bot"?" active":"")+'" data-view="bot">Solo bot '+cBot+'</button>'
    +'</div>';

  var rows='';
  filtered.slice(0,80).forEach(function(sid){
    var s=sessionMap[sid];var m=s.msgs;
    var time=s.lastTs?new Date(s.lastTs).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):"";
    var statusBadge='';
    if(s.hasIncident&&!s.hasAgent)statusBadge='<span class="status-badge badge-pending">Incidencia</span>';
    else if(s.hasAgent)statusBadge='<span class="status-badge badge-agent">Agente</span>';

    var catTags='';Object.keys(s.cats).forEach(function(cat){if(cat!=="general"&&cat!=="agent_mode")catTags+='<span class="cat-tag cat-'+cat+'">'+cat+'</span>'});

    var inc=incMap[sid];
    var incLine='';
    if(inc){
      var parts=[];
      if(inc.name&&inc.name!=="No proporcionado")parts.push(inc.name);
      if(inc.phone&&inc.phone!=="No proporcionado")parts.push(inc.phone);
      if(parts.length)incLine='<div class="inc-info">'+escHtml(parts.join(' - '))+'</div>';
    }

    // msgs are DESC from API, so last=oldest(first msg), first=newest(latest msg)
    var firstUser="";var latestBot="";
    for(var mi=m.length-1;mi>=0;mi--){if(m[mi].user&&m[mi].user!=="[ADMIN]"){firstUser=m[mi].user;break}}
    for(var mj=0;mj<m.length;mj++){if(m[mj].bot&&m[mj].user!=="[ADMIN]"){latestBot=m[mj].bot;break}}
    var preview=searchQuery?highlightSearch(firstUser,searchQuery):escHtml(firstUser);
    var botPreview=searchQuery?highlightSearch(latestBot.slice(0,120),searchQuery):escHtml(latestBot.slice(0,120));

    var borderColor=s.hasIncident&&!s.hasAgent?'var(--red)':s.hasAgent?'var(--orange)':'transparent';

    rows+='<div class="chat-row" data-session="'+escHtml(sid)+'" style="border-left:3px solid '+borderColor+'">'
      +'<div class="meta"><span class="time">'+time+'</span><div class="badges">'+statusBadge+'<span class="badge-msgs">'+m.length+' msgs</span></div></div>'
      +'<div class="user-msg">'+preview+'</div>'
      +incLine
      +'<div class="bot-msg">'+botPreview+'</div>'
      +(catTags?'<div style="margin-top:5px">'+catTags+'</div>':'')
      +'</div>';
  });

  return '<div class="conversations"><div class="conv-header"><h2>Conversaciones<span class="count">'+filtered.length+' sesiones</span></h2></div>'+tabs+'<div class="chat-list">'+rows+'</div></div>';
}

// === EVENTS ===
function bindEvents(){
  setTimeout(function(){
    var r=document.getElementById("btn_refresh");if(r)r.onclick=function(){stats=null;render()};
    var l=document.getElementById("btn_logout");if(l)l.onclick=function(){KEY="";CURRENT_USER="";localStorage.removeItem("bj_dash_key");localStorage.removeItem("bj_dash_user");stats=null;render()};
    var dm=document.getElementById("btn_dark");if(dm)dm.onclick=function(){darkMode=!darkMode;document.body.classList.toggle("dark",darkMode);localStorage.setItem("bj_dark",darkMode?"1":"0");render()};
    var pb=document.getElementById("btn_push");if(pb)pb.onclick=function(){subscribePush()};
    var rpt=document.getElementById("btn_report");if(rpt)rpt.onclick=function(){
      var p=prompt("Tipo de informe:\n1 = Semanal\n2 = Mensual","1");
      if(p==="2")generateReport("monthly");else if(p==="1"||p)generateReport("weekly");
    };
    // Search
    var si=document.getElementById("search_input");if(si){
      var debounce;si.oninput=function(){clearTimeout(debounce);debounce=setTimeout(function(){searchQuery=si.value.trim();render()},400)};
    }
    // Tabs
    document.querySelectorAll(".tab").forEach(function(tab){tab.onclick=function(){chatViewFilter=tab.dataset.view;render()}});
    // Chat rows
    document.querySelectorAll(".chat-list").forEach(function(cl){cl.onclick=function(e){var row=e.target.closest(".chat-row");if(row&&row.dataset.session&&!e.target.closest("button"))openSession(row.dataset.session)}});
  },30);
}

// === AUTO REFRESH ===
function startAutoRefresh(){
  stopAutoRefresh();
  if(!autoRefresh)return;
  refreshTimer=setInterval(function(){
    fetch("/api/stats?key="+encodeURIComponent(KEY))
    .then(function(r){if(r.status===401)return null;return r.json()})
    .then(function(data){
      if(!data)return;
      var newPending=(data.incidents_list||[]).filter(function(i){return i.status!=="resolved"}).length;
      if(newPending>lastIncidentCount&&lastIncidentCount>0)playNotifSound();
      lastIncidentCount=newPending;
      stats=data;render();
    }).catch(function(){});
  },60000);
}
function stopAutoRefresh(){if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null}}

// === SESSION MODAL ===
function adminReplyBar(sid){
  return '<div style="display:flex;gap:8px;padding:14px 0;border-top:2px solid var(--border);margin-top:14px;flex-wrap:wrap">'
    +'<input id="admin_reply_input" type="text" placeholder="Responder como agente..." style="flex:1;min-width:140px;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:Inter,sans-serif;background:var(--bg);color:var(--text)">'
    +'<button id="admin_reply_btn" style="background:var(--navy);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:12px;font-weight:700;cursor:pointer">Enviar</button>'
    +'</div>';
}


function bindAdminReply(sid,modal){
  var btn=document.getElementById("admin_reply_btn");
  var inp=document.getElementById("admin_reply_input");
  if(!btn||!inp)return;
  function send(){
    var msg=inp.value.trim();if(!msg)return;
    btn.textContent="...";btn.disabled=true;inp.disabled=true;
    fetch("/api/stats",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:KEY,action:"admin_reply",session:sid,message:msg})})
    .then(function(r){return r.json()}).then(function(){
      var body=modal.querySelector(".modal-body");
      var div=document.createElement("div");div.className="admin-msg";
      div.innerHTML='<b>Admin</b>'+escHtml(msg)+'<div style="font-size:8px;opacity:.5;margin-top:4px">Ahora</div>';
      body.insertBefore(div,body.querySelector("[style*=border-top]"));
      inp.value="";btn.textContent="Enviar";btn.disabled=false;inp.disabled=false;inp.focus();
    }).catch(function(){alert("Error enviando");btn.textContent="Enviar";btn.disabled=false;inp.disabled=false});
  }
  btn.onclick=send;
  inp.onkeydown=function(e){if(e.key==="Enter")send()};


}

function renderMsgs(msgs){
  var html='';msgs.forEach(function(m){
    var t=m.ts?new Date(m.ts).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):"";
    var isAdmin=m.user==="[ADMIN]"||m.prompt_version==="ADMIN";
    if(m.user&&!isAdmin)html+='<div class="modal-msg user">'+escHtml(m.user)+'<div class="msg-time">'+t+'</div></div>';
    if(m.bot&&!isAdmin)html+='<div class="modal-msg bot">'+escHtml(m.bot)+'<div class="msg-time">'+t+'</div></div>';
    if(isAdmin&&m.bot)html+='<div class="admin-msg"><b>Admin</b>'+escHtml(m.bot)+'<div style="font-size:8px;opacity:.5;margin-top:4px">'+t+'</div></div>';
  });return html;
}

function openSession(sid){
  var modal=document.createElement("div");modal.className="modal-bg";
  modal.innerHTML='<div class="modal"><div class="modal-header"><h3>'+escHtml(sid.slice(0,16))+'</h3><div style="display:flex;align-items:center;gap:10px"><span id="live_indicator" style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--green);font-weight:700"><span style="width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse-soft 2s infinite"></span>EN VIVO</span><button class="modal-close">&times;</button></div></div><div class="modal-body" id="live_chat_body"><div class="modal-loading">Cargando...</div></div></div>';
  document.body.appendChild(modal);
  var _liveInterval=null;var _lastMsgCount=0;
  modal.querySelector(".modal-close").onclick=function(){if(_liveInterval)clearInterval(_liveInterval);modal.remove()};
  modal.onclick=function(e){if(e.target===modal){if(_liveInterval)clearInterval(_liveInterval);modal.remove()}};

  function loadAndRender(isInitial){
    fetch("/api/stats?key="+encodeURIComponent(KEY)+"&session="+encodeURIComponent(sid))
    .then(function(r){return r.json()})
    .then(function(data){
      var body=document.getElementById("live_chat_body");if(!body)return;
      var msgs=data.messages||[];
      if(!isInitial&&msgs.length===_lastMsgCount)return;
      _lastMsgCount=msgs.length;
      _sessionEscalated=!!data.is_escalated;
      var scrollEl=body;
      var wasAtBottom=scrollEl.scrollHeight-scrollEl.scrollTop-scrollEl.clientHeight<60;
      body.innerHTML=renderMsgs(msgs)+adminReplyBar(sid);
      bindAdminReply(sid,modal);
      if(wasAtBottom||isInitial)scrollEl.scrollTop=scrollEl.scrollHeight;
      if(!isInitial&&msgs.length>0){
        var last=msgs[msgs.length-1];
        if(last.user&&last.user!=="[ADMIN]"){
          var ind=document.getElementById("live_indicator");
          if(ind)ind.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse-soft 2s infinite"></span><span style="color:var(--red)">NUEVO</span>';
          setTimeout(function(){if(ind)ind.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse-soft 2s infinite"></span>EN VIVO'},3000);
        }
      }
    }).catch(function(){});
  }

  // Local data first
  var localMsgs=(stats&&stats.chats||[]).filter(function(c){return c.session===sid}).sort(function(a,b){return new Date(a.ts)-new Date(b.ts)});
  if(localMsgs.length>0){
    var body=document.getElementById("live_chat_body");
    _lastMsgCount=localMsgs.length;
    body.innerHTML=renderMsgs(localMsgs)+adminReplyBar(sid);
    bindAdminReply(sid,modal);
    body.scrollTop=body.scrollHeight;
  }
  loadAndRender(true);
  _liveInterval=setInterval(function(){loadAndRender(false)},3000);
}

// === LOAD STATS ===
function loadStats(){
  fetch("/api/stats?key="+encodeURIComponent(KEY))
  .then(function(r){if(r.status===401){KEY="";localStorage.removeItem("bj_dash_key");alert("Clave incorrecta");render();return null}return r.json()})
  .then(function(data){if(data){stats=data;lastIncidentCount=(data.incidents_list||[]).filter(function(i){return i.status!=="resolved"}).length;render()}})
  .catch(function(){alert("Error de conexion")});
}

// === REPORTS ===
function generateReport(period){
  var modal=document.createElement("div");modal.className="modal-bg";
  modal.innerHTML='<div class="modal" style="max-width:700px"><div class="modal-header"><h3>Informe '+(period==="monthly"?"Mensual":"Semanal")+'</h3><div style="display:flex;gap:8px"><button id="rpt_copy" class="hbtn" style="display:none;background:var(--navy)">Copiar</button><button id="rpt_download" class="hbtn green" style="display:none">PDF</button><button class="modal-close">&times;</button></div></div><div class="modal-body" id="rpt_body"><div class="modal-loading">Generando informe...</div></div></div>';
  document.body.appendChild(modal);
  modal.querySelector(".modal-close").onclick=function(){modal.remove()};
  modal.onclick=function(e){if(e.target===modal)modal.remove()};
  fetch("/api/report?key="+encodeURIComponent(KEY)+"&period="+period)
  .then(function(r){return r.json()})
  .then(function(data){
    var body=document.getElementById("rpt_body");if(!body)return;
    if(data.error){body.innerHTML='<div class="modal-loading" style="color:var(--red)">Error: '+escHtml(data.error)+'</div>';return}
    var report=data.report||"Sin datos";
    body.innerHTML='<div style="font-size:12px;line-height:1.7">'+report+'</div>';
    body.querySelectorAll("table").forEach(function(t){t.style.cssText="width:100%;border-collapse:collapse;margin:10px 0;font-size:11px";t.querySelectorAll("th").forEach(function(th){th.style.cssText="background:var(--navy);color:#fff;padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase"});t.querySelectorAll("td").forEach(function(td){td.style.cssText="padding:8px 10px;border-bottom:1px solid var(--border)"})});
    body.querySelectorAll("h2").forEach(function(h){h.style.cssText="font-size:14px;margin:18px 0 8px;padding-bottom:4px;border-bottom:2px solid #F5E1A4"});
    var copyBtn=document.getElementById("rpt_copy");var dlBtn=document.getElementById("rpt_download");
    if(copyBtn){copyBtn.style.display="inline-block";copyBtn.onclick=function(){navigator.clipboard.writeText(report);copyBtn.textContent="Copiado!";setTimeout(function(){copyBtn.textContent="Copiar"},2000)}}
    if(dlBtn){dlBtn.style.display="inline-block";dlBtn.onclick=function(){
      var win=window.open("","_blank");var d=data.data||{};var dateStr=new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"long",year:"numeric"});
      var resRate=d.resolution_rate||0;var resColor=resRate>=80?"#10b981":resRate>=50?"#f59e0b":"#ef4444";
      win.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>Informe BurgerJazz</title><style>@page{margin:16mm}body{font-family:system-ui,sans-serif;color:#1a1a2e;line-height:1.7;font-size:13px;max-width:750px;margin:0 auto;padding:30px}h2{font-size:15px;margin:20px 0 8px;border-bottom:2px solid #F5E1A4;padding-bottom:4px}table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}th{background:#002855;color:#fff;padding:8px 12px;text-align:left}td{padding:8px 12px;border-bottom:1px solid #e8eaed}.header-bar{background:linear-gradient(135deg,#002855,#003d7a);color:#fff;padding:28px 32px;border-radius:14px;margin-bottom:24px}.header-bar h1{font-size:22px;margin:0}.header-bar .sub{font-size:13px;opacity:.8;margin-top:4px}.kpi-row{display:flex;gap:12px;margin-bottom:20px}.kpi{flex:1;background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #e8eaed}.kpi .val{font-size:26px;font-weight:900}.kpi .label{font-size:9px;color:#8893a4;text-transform:uppercase;margin-top:2px}.footer{margin-top:30px;padding-top:16px;border-top:2px solid #F5E1A4;font-size:10px;color:#8893a4;text-align:center}</style></head><body>'
        +'<div class="header-bar"><h1>BURGERJAZZ</h1><div class="sub">Informe '+(period==="monthly"?"Mensual":"Semanal")+'</div><div style="font-size:12px;opacity:.6;margin-top:6px">'+dateStr+'</div></div>'
        +'<div class="kpi-row"><div class="kpi"><div class="val">'+(d.total_messages||0)+'</div><div class="label">Mensajes</div></div><div class="kpi"><div class="val">'+(d.sessions||0)+'</div><div class="label">Sesiones</div></div><div class="kpi"><div class="val" style="color:'+resColor+'">'+(d.resolution_rate||0)+'%</div><div class="label">Resolucion</div></div><div class="kpi"><div class="val">'+(d.satisfaction?d.satisfaction.toFixed(1):"N/A")+'</div><div class="label">Satisfaccion</div></div></div>'
        +'<div style="font-size:13px;line-height:1.8">'+report+'</div>'
        +'<div class="footer">JazzBot Analytics | BurgerJazz &copy; '+new Date().getFullYear()+'</div></body></html>');
      win.document.close();setTimeout(function(){win.print()},500);
    }}
  }).catch(function(){var body=document.getElementById("rpt_body");if(body)body.innerHTML='<div class="modal-loading" style="color:var(--red)">Error de conexion</div>'});
}

// === PUSH NOTIFICATIONS ===
window._pushSubscribed=localStorage.getItem("bj_push_on")==="1";

function initServiceWorker(){
  if(!("serviceWorker" in navigator))return;
  navigator.serviceWorker.register("/sw-admin.js").then(function(reg){
    reg.pushManager.getSubscription().then(function(sub){
      var prev=window._pushSubscribed;
      if(!sub){
        window._pushSubscribed=false;
        localStorage.removeItem("bj_push_on");
        if(prev&&stats)render();
        return;
      }
      window._pushSubscribed=true;
      localStorage.setItem("bj_push_on","1");
      if(!prev&&stats)render();
    });
  }).catch(function(){});
}

function urlBase64ToUint8Array(base64String){
  var padding="=".repeat((4-base64String.length%4)%4);
  var base64=(base64String+padding).replace(/-/g,"+").replace(/_/g,"/");
  var rawData=atob(base64);var outputArray=new Uint8Array(rawData.length);
  for(var i=0;i<rawData.length;++i)outputArray[i]=rawData.charCodeAt(i);
  return outputArray;
}

function subscribePush(){
  if(!("serviceWorker" in navigator)||!("PushManager" in window)){alert("Tu navegador no soporta notificaciones push");return}

  // Toggle OFF: if already subscribed, unsubscribe
  if(window._pushSubscribed){
    navigator.serviceWorker.ready.then(function(reg){
      return reg.pushManager.getSubscription();
    }).then(function(sub){
      if(sub)return sub.unsubscribe();
    }).then(function(){
      window._pushSubscribed=false;localStorage.removeItem("bj_push_on");render();
    }).catch(function(){});
    return;
  }

  // Toggle ON: subscribe
  var userName=CURRENT_USER||CURRENT_USER_INIT||localStorage.getItem("bj_dash_user")||"";
  if(!userName){alert("Inicia sesion primero");return}
  fetch("/api/push?key="+encodeURIComponent(KEY)).then(function(r){return r.json()}).then(function(data){
    if(!data.vapidPublicKey){alert("Error: VAPID no configurado");return}
    navigator.serviceWorker.ready.then(function(reg){
      return reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(data.vapidPublicKey)});
    }).then(function(subscription){
      return fetch("/api/push",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:KEY,action:"subscribe",subscription:subscription.toJSON(),userName:userName})});
    }).then(function(r){return r.json()}).then(function(result){
      if(result.ok){window._pushSubscribed=true;localStorage.setItem("bj_push_on","1");render();alert("Notificaciones activadas para "+userName)}
      else{alert("Error: "+(result.error||"desconocido"))}
    }).catch(function(e){
      if(e.name==="NotAllowedError")alert("Permiso denegado. Activa las notificaciones en Ajustes.");
      else alert("Error: "+e.message);
    });
  }).catch(function(){alert("Error de conexion")});
}

setTimeout(initServiceWorker,1000);
render();
})();
</script>
