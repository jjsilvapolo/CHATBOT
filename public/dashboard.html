<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#002855">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/logo.png">
<title>BurgerJazz Chatbot - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f7;--card:#fff;--navy:#002855;--navy2:#003d7a;--text:#002855;--muted:#6b7280;--border:#e4e2dd;--border2:#f4f5f7;--gold:#F5E1A4;--green:#16a34a;--red:#dc2626;--orange:#d97706;--blue:#2563eb;--hover:#f9f9f7;--shadow:0 1px 4px rgba(0,0,0,.06)}
body.dark{--bg:#0f172a;--card:#1e293b;--navy:#1e40af;--navy2:#2563eb;--text:#e2e8f0;--muted:#94a3b8;--border:#334155;--border2:#334155;--gold:#fbbf24;--hover:#334155;--shadow:0 1px 4px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:700;letter-spacing:1px}
.header .left{display:flex;align-items:center;gap:12px}
.header .right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.header .status{display:flex;align-items:center;gap:6px;font-size:12px}
.header .dot{width:9px;height:9px;border-radius:50%}
.header .dot.ok{background:#16a34a}
.header .dot.err{background:#dc2626}
.header .dot.warn{background:#F5E1A4}
.header button,.hbtn{background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:11px;font-weight:700;transition:background .15s}
.header button:hover,.hbtn:hover{background:rgba(255,255,255,.25)}
.refresh-indicator{font-size:10px;opacity:.7;margin-left:4px}
.notif-badge{position:relative}
.notif-badge .badge{position:absolute;top:-4px;right:-4px;background:#dc2626;color:#fff;font-size:8px;font-weight:900;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--navy)}
.login-box{background:var(--card);border-radius:16px;padding:40px;text-align:center;width:340px}
.login-box h2{font-size:18px;margin-bottom:16px;color:var(--text)}
.login-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px;background:var(--bg);color:var(--text)}
.login-box button{width:100%;padding:10px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.toolbar{padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:46px;z-index:99}
.toolbar input,.toolbar select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'Lato',sans-serif;background:var(--bg);color:var(--text)}
.toolbar input[type=text]{min-width:200px}
.toolbar label{font-size:11px;font-weight:700;color:var(--muted)}
.toolbar button{padding:6px 12px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.toolbar button.sec{background:var(--border);color:var(--text)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;padding:14px 20px}
.card{background:var(--card);border-radius:10px;padding:14px;box-shadow:var(--shadow);transition:transform .15s}
.card:hover{transform:translateY(-1px)}
.card h3{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card .val{font-size:26px;font-weight:900;color:var(--text)}
.card .sub{font-size:10px;color:var(--muted);margin-top:3px}
.card.alert{border-left:3px solid var(--red)}
.card.ok{border-left:3px solid var(--green)}
.card.warn{border-left:3px solid var(--gold)}
.section{padding:6px 20px;margin-bottom:4px}
.section h2{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--text);display:flex;align-items:center;gap:8px}
.section h2 .badge-sm{font-size:10px;background:var(--border2);padding:2px 8px;border-radius:10px;font-weight:400;color:var(--muted)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:6px 20px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;padding:6px 20px}
.box{background:var(--card);border-radius:10px;padding:16px;box-shadow:var(--shadow)}
.box h3{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border2);font-size:12px}
.row:last-child{border:none}
.row .label{color:var(--muted)}
.row .value{font-weight:900;color:var(--text)}
.cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cat{background:var(--card);border-radius:6px;padding:7px 12px;font-size:11px;font-weight:700;box-shadow:var(--shadow);display:flex;align-items:center;gap:5px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.cat:hover,.cat.active{border-color:var(--navy);background:var(--navy);color:#fff}
.cat .cnt{background:var(--border2);color:var(--text);border-radius:10px;padding:1px 6px;font-size:9px;font-weight:900}
.cat:hover .cnt,.cat.active .cnt{background:rgba(255,255,255,.2);color:#fff}
.chat-list{background:var(--card);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);max-height:500px;overflow-y:auto}
.chat-row{padding:10px 14px;border-bottom:1px solid var(--border2);font-size:11px;cursor:pointer;transition:background .1s}
.chat-row:hover{background:var(--hover)}
.chat-row .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.chat-row .time{font-size:9px;color:var(--muted)}
.chat-row .cat-tag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase}
.chat-row .user-msg{color:var(--text);font-weight:600;margin-bottom:2px}
.chat-row .bot-msg{color:var(--muted);font-weight:400}
.cat-carta{background:#dbeafe;color:#2563eb}.cat-locales{background:#dcfce7;color:#16a34a}
.cat-pedidos,.cat-seguimiento{background:#fef3c7;color:#d97706}
.cat-pedido_incompleto,.cat-incidencia{background:#fee2e2;color:#dc2626}
.cat-promos{background:#ede9fe;color:#7c3aed}.cat-alergenos{background:#fce7f3;color:#be185d}
.cat-general{background:var(--border2);color:var(--muted)}.cat-error{background:#fee2e2;color:#dc2626}
.cat-reservas,.cat-horarios{background:#e0f2fe;color:#0284c7}
.cat-empleo{background:#f0fdf4;color:#15803d}.cat-pagos,.cat-facturas{background:#fefce8;color:#a16207}
.cat-dieta{background:#f0fdfa;color:#0d9488}.cat-recomendacion{background:#faf5ff;color:#7c3aed}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:90px;padding:8px 0}
.bar{background:var(--navy);border-radius:3px 3px 0 0;min-width:12px;flex:1;position:relative;transition:height .3s}
.bar:hover{background:var(--gold)}
.bar .bar-label{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--muted);white-space:nowrap}
.bar .bar-val{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;color:var(--text)}
.hour-chart{display:flex;align-items:flex-end;gap:2px;height:70px;padding:8px 0}
.hour-bar{background:var(--navy);border-radius:2px 2px 0 0;flex:1;position:relative;transition:height .3s;min-width:6px}
.hour-bar:hover{background:var(--gold)}
.hour-bar .h-label{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:6px;color:var(--muted)}
.hour-bar .h-val{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:7px;font-weight:700;color:var(--text)}
.heatmap{display:grid;grid-template-columns:40px repeat(24,1fr);gap:1px;font-size:8px}
.heatmap .day-label{display:flex;align-items:center;justify-content:flex-end;padding-right:4px;color:var(--muted);font-weight:700;font-size:9px}
.heatmap .hour-label{text-align:center;color:var(--muted);font-size:7px;padding:2px 0}
.heatmap .cell{border-radius:2px;min-height:18px;position:relative;cursor:default;transition:opacity .15s}
.heatmap .cell:hover{opacity:.8}
.heatmap .cell .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:3px 6px;border-radius:4px;font-size:9px;white-space:nowrap;z-index:10}
.heatmap .cell:hover .tip{display:block}
.funnel{display:flex;align-items:center;gap:0;padding:10px 0}
.funnel-step{text-align:center;flex:1;position:relative}
.funnel-bar{margin:0 auto;border-radius:6px;background:var(--navy);color:#fff;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;transition:width .3s,height .3s}
.funnel-label{font-size:9px;color:var(--muted);margin-top:4px}
.funnel-arrow{color:var(--muted);font-size:16px;margin:0 -4px}
.trend-chart{display:flex;align-items:flex-end;gap:2px;height:60px;padding:6px 0}
.trend-dot{width:6px;height:6px;border-radius:50%;background:var(--navy);position:absolute}
.sat-box{background:var(--card);border-radius:10px;padding:16px;box-shadow:var(--shadow);margin:0 20px 6px}
.sat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sat-header h3{font-size:13px;font-weight:700;color:var(--text)}
.sat-score{font-size:32px;font-weight:900;color:var(--text)}
.sat-stars{font-size:20px;margin:3px 0}
.sat-bar-row{flex:1;display:flex;align-items:center;gap:5px;font-size:10px}
.sat-bar-row .emoji{font-size:14px}
.sat-bar-row .bar-bg{flex:1;height:7px;background:var(--border2);border-radius:4px;overflow:hidden}
.sat-bar-row .bar-fill{height:100%;border-radius:4px;transition:width .3s}
.sat-bar-row .cnt{font-weight:900;color:var(--text);min-width:18px;text-align:right;font-size:10px}
.lang-bar{height:5px;border-radius:3px;margin-top:4px;display:flex;overflow:hidden}
.lang-bar span{height:100%}
.long-session{font-size:10px;padding:6px 0;border-bottom:1px solid var(--border2);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.long-session:hover{background:var(--hover)}
.long-session .msgs{background:#fee2e2;color:#dc2626;font-size:8px;font-weight:900;padding:2px 6px;border-radius:8px}
.sentiment-neg{color:#dc2626;font-weight:700}
.sentiment-ok{color:#16a34a;font-weight:700}
.weekly-compare{display:flex;gap:14px;align-items:center;font-size:11px;margin-top:4px}
.arrow-up{color:#dc2626;font-weight:900}
.arrow-down{color:#16a34a;font-weight:900}
.arrow-same{color:var(--muted);font-weight:900}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border-radius:14px;width:100%;max-width:560px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:13px;color:var(--text)}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:4px 8px}
.modal-body{padding:14px 18px;overflow-y:auto;flex:1}
.modal-msg{margin-bottom:10px;font-size:12px;line-height:1.5}
.modal-msg.user{background:var(--navy);color:#fff;padding:8px 12px;border-radius:10px 10px 4px 10px;max-width:85%;margin-left:auto}
.modal-msg.bot{background:var(--border2);color:var(--text);padding:8px 12px;border-radius:10px 10px 10px 4px;max-width:85%}
.modal-msg .msg-time{font-size:8px;opacity:.6;margin-top:3px}
.modal-loading{text-align:center;padding:24px;color:var(--muted);font-size:12px}
.inc-notes{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:'Lato',sans-serif;resize:vertical;min-height:32px;background:var(--bg);color:var(--text);margin-top:4px}
.inc-actions{display:flex;gap:4px;align-items:center;margin-top:4px}
.inc-actions button{padding:3px 8px;border:none;border-radius:4px;font-size:9px;font-weight:700;cursor:pointer}
.search-highlight{background:#fef08a;color:#000;padding:0 1px;border-radius:2px}
@media(max-width:768px){
.grid{grid-template-columns:1fr 1fr}
.two-col,.three-col{grid-template-columns:1fr}
.header h1{font-size:13px}
.header .right{justify-content:flex-end}
.modal{max-width:100%;max-height:90vh}
.toolbar{flex-direction:column;align-items:stretch}
.toolbar input[type=text]{min-width:auto;width:100%}
.heatmap{font-size:6px}
.funnel{flex-wrap:wrap}
.sat-box{margin:0 10px 6px}
.section,.grid{padding-left:10px;padding-right:10px}
.two-col,.three-col{padding-left:10px;padding-right:10px}
}
@media(max-width:480px){
.grid{grid-template-columns:1fr}
.header{padding:10px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
var KEY=localStorage.getItem("bj_dash_key")||"";
var stats=null;
var filterCat="all";
var filterLocal="all";
var dateFrom="";
var dateTo="";
var searchQuery="";
var darkMode=localStorage.getItem("bj_dark")==="1";
var autoRefresh=true;
var refreshTimer=null;
var lastIncidentCount=0;
var REFRESH_INTERVAL=60000;

if(darkMode)document.body.classList.add("dark");

var LOCALES_MAP={
"chamberi":"Chamberi","modesto":"Chamberi","lafuente":"Chamberi",
"plaza espana":"Plaza Espana","fomento":"Plaza Espana",
"retiro":"Retiro","o'donnell":"Retiro","odonnell":"Retiro",
"delicias":"Delicias",
"alcorcon":"Alcorcon","timanfaya":"Alcorcon",
"majadahonda":"Majadahonda","reyes catolicos":"Majadahonda",
"pozuelo":"Pozuelo","atenas":"Pozuelo",
"mirasierra":"Mirasierra","fermin":"Mirasierra",
"alcobendas":"Alcobendas","fuente lucha":"Alcobendas",
"valladolid":"Valladolid","moyano":"Valladolid"
};
var ALL_LOCALES=["Chamberi","Plaza Espana","Retiro","Delicias","Alcorcon","Majadahonda","Pozuelo","Mirasierra","Alcobendas","Valladolid"];

var NEG_WORDS=/queja|problema|asco|asqueroso|mal|frio|tarde|tarda|nunca|horrible|peor|decepcion|vergüenza|inaceptable|lamentable|fatal|desastre|estafa|robo|mentira|falso|espera|denunci/i;
var LANG_PATTERNS={"en":/\b(hello|hi|please|thank|would|could|where|what|how much|sorry|excuse|order|burger|menu|deliver|allergic)\b/i,"fr":/\b(bonjour|merci|s'il vous|excusez|commander)\b/i,"de":/\b(hallo|danke|bitte|entschuldigung|bestellen)\b/i,"pt":/\b(ola|obrigado|por favor|desculpe|pedido)\b/i,"it":/\b(ciao|grazie|per favore|scusi|ordinare)\b/i};
var DELIVERY_RE=/\b(glovo|uber\s*eats?|uber)\b/i;
var DAY_NAMES=["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];

// === AUDIO NOTIFICATION ===
function playNotifSound(){
try{var a=new(window.AudioContext||window.webkitAudioContext)();var o=a.createOscillator();var g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;o.type="sine";g.gain.value=0.15;o.start();o.stop(a.currentTime+0.15);setTimeout(function(){var o2=a.createOscillator();var g2=a.createGain();o2.connect(g2);g2.connect(a.destination);o2.frequency.value=1100;o2.type="sine";g2.gain.value=0.12;o2.start();o2.stop(a.currentTime+0.15)},180)}catch(e){}
}

function render(){
var app=document.getElementById("app");
if(!KEY){app.innerHTML=loginHTML();bindLogin();return}
if(!stats){app.innerHTML='<div class="login"><div class="login-box"><h2>Cargando...</h2></div></div>';loadStats();return}
app.innerHTML=headerHTML()+toolbarHTML()+cardsHTML()+satisfactionHTML()+feedbackHTML()+abTestHTML()+weeklyHTML()+chartAndHeatmapHTML()+hourlyChartHTML()+funnelHTML()+insightsHTML()+incidentsHTML()+catsHTML()+chatsHTML();
bindEvents();
startAutoRefresh();
}

function loginHTML(){
return '<div class="login"><div class="login-box"><h2>BURGERJAZZ Dashboard</h2><p style="font-size:12px;color:var(--muted);margin-bottom:16px">Introduce la clave del dashboard</p><input id="key_input" type="password" placeholder="Dashboard key..."><button id="key_btn">Entrar</button></div></div>';
}
function bindLogin(){
setTimeout(function(){var b=document.getElementById("key_btn");var i=document.getElementById("key_input");if(b)b.onclick=function(){KEY=i.value.trim();localStorage.setItem("bj_dash_key",KEY);render()};if(i)i.onkeydown=function(e){if(e.key==="Enter")b.click()}},50);
}

function headerHTML(){
var cs=stats.creditStatus;
var dot=cs==="ok"?"ok":cs==="NO_CREDIT"?"err":"warn";
var label=cs==="ok"?"OK":cs==="NO_CREDIT"?"SIN CREDITOS":"?";
var pendingInc=(stats.incidents_list||[]).filter(function(i){return i.status!=="resolved"}).length;
var notifHtml=pendingInc>0?'<div class="notif-badge"><button id="btn_incidents_jump" title="Ir a incidencias">Incidencias<div class="badge">'+pendingInc+'</div></button></div>':'';
var pushBtnLabel=window._pushSubscribed?'Notif ON':'Notif OFF';
var pushBtnStyle=window._pushSubscribed?'background:#16a34a':'background:#d97706';
var pushTestBtn=window._pushSubscribed?'<button id="btn_push_test" style="background:#2563eb" title="Enviar notificacion de prueba">Test</button>':'';
return '<div class="header"><div class="left"><h1>BURGERJAZZ DASHBOARD</h1><div class="status"><div class="dot '+dot+'"></div><span>'+label+'</span></div><span class="refresh-indicator" id="refresh_ind">'+(autoRefresh?'Auto-refresh ON':'')+'</span></div><div class="right">'+notifHtml+'<button id="btn_push" style="'+pushBtnStyle+'" title="Activar notificaciones push">'+pushBtnLabel+'</button>'+pushTestBtn+'<button id="btn_dark" title="Dark mode">'+(darkMode?'&#9788;':'&#9790;')+'</button><button id="btn_export_csv" style="background:#d97706">CSV</button><button id="btn_report_week" style="background:#16a34a">Semanal</button><button id="btn_report_month" style="background:#2563eb">Mensual</button><button id="btn_refresh">Actualizar</button><button id="btn_logout">Salir</button></div></div>';
}

function toolbarHTML(){
var today=new Date().toISOString().slice(0,10);
var localOpts='<option value="all">Todos los locales</option>';
ALL_LOCALES.forEach(function(l){localOpts+='<option value="'+l+'"'+(filterLocal===l?' selected':'')+'>'+l+'</option>'});
return '<div class="toolbar"><input type="text" id="search_input" placeholder="Buscar conversaciones..." value="'+escHtml(searchQuery)+'"><select id="local_filter">'+localOpts+'</select><label>Desde</label><input type="date" id="date_from" value="'+(dateFrom||"")+'"><label>Hasta</label><input type="date" id="date_to" value="'+(dateTo||today)+'"><button id="btn_date_filter">Filtrar</button><button id="btn_date_clear" class="sec">Limpiar</button><label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="auto_refresh_cb" '+(autoRefresh?'checked':'')+'>Auto-refresh</label></div>';
}

// === HELPERS ===
function detectSentiment(t){return t&&NEG_WORDS.test(t)?"negativo":"neutral"}
function detectLang(t){if(!t)return"es";for(var l in LANG_PATTERNS)if(LANG_PATTERNS[l].test(t))return l;return"es"}
function detectLocal(t){if(!t)return null;var s=t.toLowerCase();for(var k in LOCALES_MAP)if(s.indexOf(k)!==-1)return LOCALES_MAP[k];return null}
function isDeliveryPlatform(t){return t&&DELIVERY_RE.test(t)}
function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function escCsv(s){return(s||"").replace(/"/g,'""')}
function highlightSearch(text,query){
if(!query)return escHtml(text);
var esc=escHtml(text);
var re=new RegExp("("+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+")","gi");
return esc.replace(re,'<span class="search-highlight">$1</span>');
}

function filterByDate(list){
if(!dateFrom&&!dateTo)return list;
return list.filter(function(c){var day=(c.ts||"").slice(0,10);if(dateFrom&&day<dateFrom)return false;if(dateTo&&day>dateTo)return false;return true});
}
function filterByLocal(list){
if(filterLocal==="all")return list;
return list.filter(function(c){var loc=detectLocal(c.user)||detectLocal(c.bot);return loc===filterLocal});
}
function filterBySearch(list){
if(!searchQuery)return list;
var q=searchQuery.toLowerCase();
return list.filter(function(c){return(c.user||"").toLowerCase().indexOf(q)!==-1||(c.bot||"").toLowerCase().indexOf(q)!==-1||(c.session||"").toLowerCase().indexOf(q)!==-1});
}

function getFilteredChats(){
var chats=stats.chats||[];
chats=filterByDate(chats);
chats=filterByLocal(chats);
chats=filterBySearch(chats);
return chats;
}

function getFilteredStats(){
var chats=getFilteredChats();

var s={chats:chats,totalChats:chats.length,dailyCounts:{},categories:{},totalTokens:{input:0,output:0},creditStatus:stats.creditStatus,estimatedCost:stats.estimatedCost,hourlyCounts:{},sessions:stats.sessions,escalatedCount:stats.escalatedCount,uniqueSessions:stats.uniqueSessions};

// Trend chart
var trend=stats.ratingsTrend||[];
if(trend.length>1){
html+='<div style="flex:1;min-width:200px"><h3 style="font-size:12px;font-weight:700;margin-bottom:8px">Tendencia (30 dias)</h3><div style="display:flex;align-items:flex-end;gap:2px;height:60px">';
var minR=5,maxR=1;trend.forEach(function(t){if(t.avg<minR)minR=t.avg;if(t.avg>maxR)maxR=t.avg});

}

// === WEEKLY ===
function weeklyHTML(){
var fs=getFilteredStats();var days=Object.keys(fs.dailyCounts).sort();if(days.length<2)return '';
var today=new Date();var thisWeek=0,lastWeek=0,thisWeekInc=0,lastWeekInc=0;
var chats=fs.chats||[];
chats.forEach(function(c){var d=new Date(c.ts);var diff=(today-d)/(86400000);
if(diff<=7){thisWeek++;if(c.category==="incidencia"||c.category==="pedido_incompleto")thisWeekInc++}
else if(diff<=14){lastWeek++;if(c.category==="incidencia"||c.category==="pedido_incompleto")lastWeekInc++}
});
function arrow(diff,inv){if(diff>0)return'<span class="'+(inv?"arrow-up":"arrow-down")+'">+'+diff+'</span>';if(diff<0)return'<span class="'+(inv?"arrow-down":"arrow-up")+'">'+diff+'</span>';return'<span class="arrow-same">=</span>'}
return '<div class="section"><h2>Resumen semanal</h2><div class="weekly-compare"><span>Mensajes: <strong>'+thisWeek+'</strong> '+arrow(thisWeek-lastWeek,false)+' vs anterior ('+lastWeek+')</span></div><div class="weekly-compare"><span>Incidencias: <strong>'+thisWeekInc+'</strong> '+arrow(thisWeekInc-lastWeekInc,true)+' vs anterior ('+lastWeekInc+')</span></div></div>';
}

function heatmapHTML(){
var chats=getFilteredChats();
var grid={};var maxVal=0;
chats.forEach(function(c){
if(!c.ts)return;
var d=new Date(c.ts);var dow=d.getDay();var h=d.getHours();
var key=dow+"_"+h;grid[key]=(grid[key]||0)+1;
if(grid[key]>maxVal)maxVal=grid[key];
});
if(maxVal===0)return '<div style="color:var(--muted);font-size:11px">Sin datos</div>';
var html='<div class="heatmap"><div></div>';
for(var h=0;h<24;h++)html+='<div class="hour-label">'+h+'</div>';
for(var d=1;d<=7;d++){
var dow=d%7;
html+='<div class="day-label">'+DAY_NAMES[dow]+'</div>';
for(var h2=0;h2<24;h2++){
var val=grid[dow+"_"+h2]||0;
var intensity=maxVal>0?val/maxVal:0;
var bg=intensity===0?"var(--border2)":"rgba(0,40,85,"+Math.max(0.1,intensity).toFixed(2)+")";
if(darkMode&&intensity>0)bg="rgba(96,165,250,"+Math.max(0.15,intensity).toFixed(2)+")";
html+='<div class="cell" style="background:'+bg+'"><div class="tip">'+DAY_NAMES[dow]+' '+h2+':00 — '+val+' msgs</div></div>';
}
}
html+='</div>';
return html;
}

function hourlyChartHTML(){
var fs=getFilteredStats();

var max=0;hours.forEach(function(h){if((hc[h]||0)>max)max=hc[h]||0});

return '<div class="section"><h2>Horas punta <span class="badge-sm">Pico: '+peakHour+':00h</span></h2><div class="hour-chart">'+bars+'</div><div style="height:16px"></div></div>';

html+='<div class="bot-msg">'+escHtml((inc.description||"").slice(0,200))+'</div>';

});

function catsHTML(){

var keys=Object.keys(cats).sort(function(a,b){return cats[b]-cats[a]});
var html='<div class="cat'+(filterCat==="all"?" active":"")+'" data-cat="all"><span>Todas</span></div>';
keys.forEach(function(k){html+='<div class="cat cat-'+k+(filterCat===k?" active":"")+'" data-cat="'+k+'"><span>'+k+'</span><span class="cnt">'+cats[k]+'</span></div>'});
return '<div class="section"><h2>Categorias</h2><div class="cats" id="cat_filter">'+html+'</div></div>';

function chatsHTML(){
var chats=getFilteredChats();
if(filterCat!=="all")chats=chats.filter(function(c){return c.category===filterCat});
if(!chats.length)return '<div class="section"><div class="chat-list"><div style="text-align:center;padding:30px;color:var(--muted);font-size:12px">Sin conversaciones</div></div></div>';
// Group by session
var sessionMap={};var sessionOrder=[];
chats.forEach(function(c){
var sid=c.session||"unknown";
if(!sessionMap[sid]){sessionMap[sid]={msgs:[],cats:{},firstTs:c.ts,lastTs:c.ts,hasError:false,hasNeg:false,hasDelivery:false};sessionOrder.push(sid)}
sessionMap[sid].msgs.push(c);
sessionMap[sid].lastTs=c.ts;
if(c.category)sessionMap[sid].cats[c.category]=(sessionMap[sid].cats[c.category]||0)+1;
if(c.category==="error"||c.category==="incidencia"||c.category==="pedido_incompleto")sessionMap[sid].hasError=true;
if(detectSentiment(c.user)==="negativo")sessionMap[sid].hasNeg=true;
if(isDeliveryPlatform(c.user))sessionMap[sid].hasDelivery=true;
});
var rows='';
sessionOrder.slice(0,80).forEach(function(sid,idx){
var s=sessionMap[sid];var m=s.msgs;
var time=s.firstTs?new Date(s.firstTs).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):"";
var catTags='';Object.keys(s.cats).forEach(function(cat){catTags+='<span class="cat-tag cat-'+cat+'">'+cat+'</span> '});
var badges='';
if(s.hasNeg)badges+=' <span style="color:#dc2626;font-size:9px;font-weight:700">NEG</span>';
if(s.hasDelivery)badges+=' <span style="font-size:9px;background:#fef3c7;color:#d97706;padding:1px 4px;border-radius:4px">DELIVERY</span>';
var firstUser=m[0]?m[0].user||"":"";
var preview=searchQuery?highlightSearch(firstUser,searchQuery):escHtml(firstUser);
var lastBot=m[m.length-1]?m[m.length-1].bot||"":"";
var botPreview=searchQuery?highlightSearch(lastBot.slice(0,150),searchQuery):escHtml(lastBot.slice(0,150));
// Build expanded messages HTML
var msgsHtml='';
m.sort(function(a,b){return new Date(a.ts)-new Date(b.ts)}).forEach(function(msg){
var t=msg.ts?new Date(msg.ts).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):"";
if(msg.user)msgsHtml+='<div style="background:var(--navy);color:#fff;padding:8px 12px;border-radius:10px 10px 4px 10px;max-width:85%;margin-left:auto;margin-bottom:8px;font-size:12px;line-height:1.5">'+escHtml(msg.user)+'<div style="font-size:8px;opacity:.6;margin-top:3px">'+t+'</div></div>';
if(msg.bot)msgsHtml+='<div style="background:var(--border2);color:var(--text);padding:8px 12px;border-radius:10px 10px 10px 4px;max-width:85%;margin-bottom:8px;font-size:12px;line-height:1.5">'+escHtml(msg.bot)+'<div style="font-size:8px;opacity:.6;margin-top:3px">'+t+'</div></div>';
});
rows+='<div class="chat-row'+(s.hasError?' style="background:rgba(220,38,38,.04)"':'')+'" onclick="var d=document.getElementById(\'sess_'+idx+'\');if(d){d.style.display=d.style.display===\'none\'?\'block\':\'none\'}"><div class="meta"><span class="time">'+time+' | '+sid.slice(0,12)+'</span><span style="font-size:9px;color:var(--muted);font-weight:700">'+m.length+' msgs</span> '+catTags+'</div><div class="user-msg">'+preview+badges+'</div><div class="bot-msg">'+botPreview+'</div><div id="sess_'+idx+'" style="display:none;padding:12px 0;border-top:1px solid var(--border);margin-top:8px">'+msgsHtml+'</div></div>';
});
return '<div class="section"><h2>Conversaciones <span class="badge-sm">'+sessionOrder.length+' sesiones</span></h2><div class="chat-list">'+rows+'</div></div>';
}

// === OPEN SESSION ===
function adminReplyBar(sid){
return '<div style="display:flex;gap:6px;padding:12px 0;border-top:2px solid var(--gold);margin-top:12px"><input id="admin_reply_input" type="text" placeholder="Responder como admin..." style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:Lato,sans-serif;background:var(--bg);color:var(--text)"><button id="admin_reply_btn" style="background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Enviar</button></div>';
}
function bindAdminReply(sid,modal){
var btn=document.getElementById("admin_reply_btn");
var inp=document.getElementById("admin_reply_input");
if(!btn||!inp)return;
function send(){
var msg=inp.value.trim();if(!msg)return;
btn.textContent="...";btn.disabled=true;inp.disabled=true;
fetch("/api/stats",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:KEY,action:"admin_reply",session:sid,message:msg})})
.then(function(r){return r.json()}).then(function(){
var body=modal.querySelector(".modal-body");
var replyDiv=document.createElement("div");replyDiv.className="modal-msg bot";
replyDiv.innerHTML='<div style="background:#FEF3C7;color:#92400E;padding:8px 12px;border-radius:10px 10px 10px 4px;max-width:85%;margin-bottom:8px;font-size:12px;line-height:1.5;border-left:3px solid var(--gold)"><b style="font-size:9px;text-transform:uppercase;letter-spacing:1px">ADMIN</b><br>'+escHtml(msg)+'<div class="msg-time">Ahora</div></div>';
body.insertBefore(replyDiv,body.querySelector("[style*=border-top]"));
inp.value="";btn.textContent="Enviar";btn.disabled=false;inp.disabled=false;inp.focus();
}).catch(function(){alert("Error enviando");btn.textContent="Enviar";btn.disabled=false;inp.disabled=false});
}
btn.onclick=send;
inp.onkeydown=function(e){if(e.key==="Enter")send()};
}
function renderMsgs(msgs){
var html='';msgs.forEach(function(m){
var t=m.ts?new Date(m.ts).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):"";
var isAdmin=m.user==="[ADMIN]"||m.prompt_version==="ADMIN";
if(m.user&&!isAdmin)html+='<div class="modal-msg user">'+escHtml(m.user)+'<div class="msg-time">'+t+'</div></div>';
if(m.bot&&!isAdmin)html+='<div class="modal-msg bot">'+escHtml(m.bot)+'<div class="msg-time">'+t+'</div></div>';
if(isAdmin&&m.bot)html+='<div style="background:#FEF3C7;color:#92400E;padding:8px 12px;border-radius:10px 10px 10px 4px;max-width:85%;margin-bottom:8px;font-size:12px;line-height:1.5;border-left:3px solid var(--gold)"><b style="font-size:9px;text-transform:uppercase;letter-spacing:1px">ADMIN</b><br>'+escHtml(m.bot)+'<div class="msg-time" style="font-size:8px;opacity:.6;margin-top:3px">'+t+'</div></div>';
});return html;
}
function openSession(sid){
var modal=document.createElement("div");modal.className="modal-bg";
modal.innerHTML='<div class="modal"><div class="modal-header"><h3>Conversacion '+escHtml(sid.slice(0,16))+'</h3><div style="display:flex;align-items:center;gap:8px"><span id="live_indicator" style="display:flex;align-items:center;gap:4px;font-size:10px;color:#16a34a;font-weight:700"><span style="width:7px;height:7px;border-radius:50%;background:#16a34a;animation:pulse 1.5s infinite"></span>EN VIVO</span><button class="modal-close">&times;</button></div></div><div class="modal-body" id="live_chat_body"><div class="modal-loading">Cargando...</div></div></div>';
document.body.appendChild(modal);
var _liveInterval=null;
var _lastMsgCount=0;
modal.querySelector(".modal-close").onclick=function(){if(_liveInterval)clearInterval(_liveInterval);modal.remove()};
modal.onclick=function(e){if(e.target===modal){if(_liveInterval)clearInterval(_liveInterval);modal.remove()}};

function loadAndRender(isInitial){
fetch("/api/stats?key="+encodeURIComponent(KEY)+"&session="+encodeURIComponent(sid))
.then(function(r){return r.json()})
.then(function(data){
var body=document.getElementById("live_chat_body");if(!body)return;
var msgs=data.messages||[];
if(!isInitial&&msgs.length===_lastMsgCount)return;
_lastMsgCount=msgs.length;
var scrollEl=body;
var wasAtBottom=scrollEl.scrollHeight-scrollEl.scrollTop-scrollEl.clientHeight<60;
body.innerHTML=renderMsgs(msgs)+adminReplyBar(sid);
bindAdminReply(sid,modal);
if(wasAtBottom||isInitial)scrollEl.scrollTop=scrollEl.scrollHeight;
if(!isInitial&&msgs.length>0){
var last=msgs[msgs.length-1];
if(last.user&&last.user!=="[ADMIN]"){
var ind=document.getElementById("live_indicator");
if(ind)ind.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:#dc2626;animation:pulse 1.5s infinite"></span><span style="color:#dc2626">NUEVO MSG</span>';
setTimeout(function(){if(ind)ind.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:#16a34a;animation:pulse 1.5s infinite"></span>EN VIVO'},3000);
}
}
}).catch(function(){});
}

// Try local data first for instant display
var localMsgs=(stats&&stats.chats||[]).filter(function(c){return c.session===sid}).sort(function(a,b){return new Date(a.ts)-new Date(b.ts)});
if(localMsgs.length>0){
var body=document.getElementById("live_chat_body");
_lastMsgCount=localMsgs.length;
body.innerHTML=renderMsgs(localMsgs)+adminReplyBar(sid);
bindAdminReply(sid,modal);
body.scrollTop=body.scrollHeight;
}
// Fetch fresh + start live polling
loadAndRender(true);
_liveInterval=setInterval(function(){loadAndRender(false)},3000);
}

// === CSV EXPORT ===
function exportCSV(){

var csv="Fecha,Session,Categoria,Mensaje Cliente,Respuesta Bot,Tokens In,Tokens Out\n";
chats.forEach(function(c){csv+='"'+(c.ts?new Date(c.ts).toISOString():"")+'","'+escCsv(c.session)+'","'+escCsv(c.category)+'","'+escCsv(c.user)+'","'+escCsv(c.bot)+'","'+(c.tokens?c.tokens.input:0)+'","'+(c.tokens?c.tokens.output:0)+'"\n'});
csv+="\n\nRATINGS\nRating,Count\n";var r=stats.ratings||{counts:{}};
for(var i=1;i<=5;i++)csv+=i+","+(r.counts[i]||0)+"\n";
csv+="\nMedia,"+((r.average||0).toFixed(2))+"\nTotal,"+(r.total||0)+"\n";
if(stats.incidents_list&&stats.incidents_list.length){csv+="\n\nINCIDENCIAS\nFecha,Nombre,Email,Descripcion,Estado,Notas\n";
stats.incidents_list.forEach(function(inc){csv+='"'+(inc.ts?new Date(inc.ts).toISOString():"")+'","'+escCsv(inc.name)+'","'+escCsv(inc.email)+'","'+escCsv(inc.description)+'","'+escCsv(inc.status)+'","'+escCsv(inc.notes)+'"\n'})}
var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});var url=URL.createObjectURL(blob);
var a=document.createElement("a");a.href=url;a.download="burgerjazz-export-"+new Date().toISOString().slice(0,10)+".csv";
document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// === PWA & PUSH NOTIFICATIONS ===
var PUSH_USERS=["Marta","Nacho","Manuel"];
window._pushSubscribed=false;

function initServiceWorker(){
if("serviceWorker" in navigator){
navigator.serviceWorker.register("/sw-admin.js").then(function(reg){
console.log("SW registered");
// Check if already subscribed
reg.pushManager.getSubscription().then(function(sub){
if(sub){window._pushSubscribed=true;render()}
});
}).catch(function(e){console.error("SW error:",e)});
}
}

function urlBase64ToUint8Array(base64String){
var padding="=".repeat((4-base64String.length%4)%4);
var base64=(base64String+padding).replace(/-/g,"+").replace(/_/g,"/");
var rawData=atob(base64);var outputArray=new Uint8Array(rawData.length);
for(var i=0;i<rawData.length;++i)outputArray[i]=rawData.charCodeAt(i);
return outputArray;
}

function subscribePush(){
if(!("serviceWorker" in navigator)||!("PushManager" in window)){alert("Tu navegador no soporta notificaciones push");return}
// Ask user name
var userName=prompt("Selecciona tu nombre:\n"+PUSH_USERS.join(", "));
if(!userName||PUSH_USERS.indexOf(userName)===-1){alert("Nombre no valido. Usa: "+PUSH_USERS.join(", "));return}
// Get VAPID key from server
fetch("/api/push?key="+KEY).then(function(r){return r.json()}).then(function(data){
if(!data.vapidPublicKey){alert("Error: VAPID no configurado");return}
navigator.serviceWorker.ready.then(function(reg){
return reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(data.vapidPublicKey)});
}).then(function(subscription){
// Send subscription to server
return fetch("/api/push",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:KEY,action:"subscribe",subscription:subscription.toJSON(),userName:userName})});
}).then(function(r){return r.json()}).then(function(result){
if(result.ok){window._pushSubscribed=true;render();alert("Notificaciones activadas para "+userName)}
else{alert("Error: "+(result.error||"desconocido"))}
}).catch(function(e){
if(e.name==="NotAllowedError"){alert("Permiso denegado. Activa las notificaciones en la configuracion del navegador.")}
else{alert("Error: "+e.message)}
});
}).catch(function(){alert("Error de conexion")});
}

// Init SW on load
setTimeout(initServiceWorker,1000);

render();
})();
</script>
